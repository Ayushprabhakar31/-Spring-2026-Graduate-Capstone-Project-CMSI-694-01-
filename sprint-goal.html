<!DOCTYPE html>
<html>
<head>
    <title>Sprint Goal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 500px;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .item {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .number {
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Sprint Goal</h2>
        <div class="item"><span class="number">01</span>Build a functional dashboard for monitoring API traffic in real time.</div>
        <div class="item"><span class="number">02</span>Deliver a working frontend connected to backend metrics endpoint.</div>
        <div class="item"><span class="number">03</span>Ensure full JIRA traceability for sprint work.</div>
    </div>
</body>
</html>
